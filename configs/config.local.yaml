app:
  name: llm-cache
  env: local

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30

redis:
  addr: "redis-cache:6379"
  username: ""
  password: ""
  db: 0

cache: 
  enabled: true
  similarity_threshold: 0.85
  ttl_seconds: 86400

embedder:
  provider: "ollama"
  model: "mxbai-embed-large"
  base_url: "http://ollama-cache:11434"

llm:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"

logging:
  level: "debug"
  format: "console"

metrics:
  enabled: true
  path: "/metrics"

health:
  path: "/healthz"

normalizer:
  filler_phrases:
    - please
    - pls
    - kindly
    - hey
    - hi
    - hello
    - can you
    - could you
    - would you
    - can you please
    - could you please
    - would you please
    - i want to
    - i need to
    - i would like to
    - i am trying to
    - im trying to
    - i was wondering if you could
    - do you know how to
    - help me
    - explain to me
    - tell me about

policy: 
  min_response_char: 20
  min_total_tokens: 5
  hedging_phrases:
    - it depends
	  - depends on
	  - depending on
	  - what if
	  - if i
	  - if we
	  - if they
	  - assuming
	  - suppose
	  - let's say
	  - lets say
    - for me
	  - my case
	  - in my case
	  - based on my
	  - given my
	  - my situation
	  - my code
	  - my file
	  - my project
  	- my setup
	  - my environment
	  - my config
	  - my database
	  - my pipeline
